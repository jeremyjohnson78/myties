<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Jeremy's Tie Collection</title>
  <meta name="description" content="Browse Jeremy's tie collection and request to borrow one."/>
  <meta name="theme-color" content="#1E40AF"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --blue:#2563EB;--blue-dark:#1E40AF;--blue-light:#DBEAFE;--blue-pale:#EFF6FF;
      --surface:#F8FAFC;--card:#FFFFFF;--text:#1E293B;--muted:#64748B;
      --border:#E2E8F0;--danger:#EF4444;--green:#16A34A;--orange:#EA580C;
      --radius:12px;--shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
      --shadow-md:0 4px 16px rgba(0,0,0,.14);
    }
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--surface);color:var(--text);min-height:100vh}

    /* Header */
    header{background:linear-gradient(135deg,#1E40AF 0%,#2563EB 100%);padding:24px;text-align:center;box-shadow:0 2px 8px rgba(30,64,175,.3)}
    header h1{font-size:1.6rem;font-weight:700;color:#fff;letter-spacing:-.3px}
    header p{font-size:.85rem;color:#BFDBFE;margin-top:6px}
    .header-stats{display:flex;gap:20px;justify-content:center;margin-top:14px;flex-wrap:wrap}
    .stat-pill{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:20px;padding:4px 14px;font-size:.78rem;color:#fff;font-weight:500}

    /* Controls */
    #controls{max-width:1100px;margin:20px auto 0;padding:0 20px;display:flex;flex-direction:column;gap:10px}
    #search-wrap{position:relative}
    #search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
    #search{width:100%;padding:11px 14px 11px 40px;border:1.5px solid var(--border);border-radius:10px;font-size:.9rem;background:var(--card);color:var(--text);outline:none}
    #search:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
    .filter-row{display:flex;align-items:center;gap:7px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
    .filter-row::-webkit-scrollbar{display:none}
    .filter-label{font-size:.7rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;flex-shrink:0;min-width:58px}
    .filter-pill{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:var(--card);color:var(--muted);font-size:.78rem;font-weight:500;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s}
    .filter-pill:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-pale)}
    .filter-pill.active{background:var(--blue);border-color:var(--blue);color:#fff}
    .color-dot{width:11px;height:11px;border-radius:50%;border:1.5px solid rgba(0,0,0,.12);flex-shrink:0;display:inline-block}

    /* Stats bar */
    #stats-bar{max-width:1100px;margin:8px auto 0;padding:0 20px}
    #stats-text{font-size:.8rem;color:var(--muted)}

    /* Grid */
    #grid{max-width:1100px;margin:16px auto 20px;padding:0 20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}
    #empty{display:none;max-width:1100px;margin:60px auto;padding:0 20px;text-align:center;color:var(--muted)}
    #loading{max-width:1100px;margin:60px auto;padding:0 20px;text-align:center;color:var(--muted)}

    /* Cards */
    .card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);display:flex;flex-direction:column;border:1.5px solid transparent;overflow:hidden;transition:transform .2s,box-shadow .2s,border-color .2s;cursor:pointer}
    .card:hover{transform:translateY(-3px);box-shadow:var(--shadow-md);border-color:var(--blue-light)}
    .card.unavailable{opacity:.65;cursor:default}
    .card.unavailable:hover{transform:none;box-shadow:var(--shadow);border-color:transparent}
    .card-photo{width:100%;aspect-ratio:3/4;object-fit:cover;display:block;background:var(--blue-pale)}
    .card-photo-placeholder{width:100%;aspect-ratio:3/4;background:var(--blue-pale);display:flex;align-items:center;justify-content:center;color:var(--blue-light)}
    .card-body{padding:11px 12px;display:flex;flex-direction:column;gap:6px;flex:1}
    .card-title{font-size:.85rem;font-weight:700;color:var(--text);display:flex;align-items:center;gap:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .card-tags{display:flex;flex-wrap:wrap;gap:4px}
    .tag{display:inline-block;font-size:.68rem;font-weight:600;padding:2px 8px;border-radius:20px}
    .tag.occasion{background:#F0FDF4;color:#15803D;border:1px solid #BBF7D0}
    .tag.size{background:#F5F3FF;color:#6D28D9;border:1px solid #DDD6FE}
    .tag.available{background:#F0FDF4;color:#15803D;border:1px solid #BBF7D0}
    .tag.unavailable{background:#FFF7ED;color:#C2410C;border:1px solid #FED7AA;font-weight:700}
    .tag.pending{background:#FEF9C3;color:#854D0E;border:1px solid #FDE68A;font-weight:700}
    .card-foot{padding:8px 12px 12px;margin-top:auto}
    .btn-request{width:100%;padding:8px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:.8rem;font-weight:600;cursor:pointer;transition:background .15s}
    .btn-request:hover{background:var(--blue-dark)}
    .btn-request:disabled{background:var(--muted);cursor:not-allowed;opacity:.6}

    /* Request Modal */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.5);backdrop-filter:blur(4px);z-index:100;align-items:center;justify-content:center;padding:16px}
    .modal-overlay.open{display:flex}
    .modal-box{background:var(--card);border-radius:16px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.28);animation:slide-up .2s ease;display:flex;flex-direction:column}
    @keyframes slide-up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    .modal-head{padding:17px 22px 13px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
    .modal-head h2{font-size:1rem;font-weight:700}
    .modal-close{background:none;border:none;color:var(--muted);cursor:pointer;padding:4px;border-radius:6px;display:flex;align-items:center}
    .modal-close:hover{color:var(--text);background:var(--border)}
    .modal-body{padding:18px 22px;display:flex;flex-direction:column;gap:13px}
    .tie-preview{display:flex;gap:12px;align-items:center;background:var(--blue-pale);border-radius:10px;padding:10px 12px}
    .tie-preview-img{width:46px;height:62px;object-fit:cover;border-radius:6px;background:var(--blue-light);flex-shrink:0}
    .tie-preview-info h3{font-size:.88rem;font-weight:700;color:var(--blue-dark)}
    .tie-preview-info p{font-size:.75rem;color:var(--muted);margin-top:2px}
    .field{display:flex;flex-direction:column;gap:4px}
    .field label{font-size:.78rem;font-weight:600;color:var(--text)}
    .field label span{color:var(--danger)}
    .field input,.field textarea{padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:.875rem;font-family:inherit;color:var(--text);background:var(--card);outline:none;transition:border-color .15s;width:100%;resize:none}
    .field input:focus,.field textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
    .modal-foot{padding:13px 22px 17px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}
    .btn-submit{background:var(--blue);color:#fff;border:none;border-radius:8px;padding:10px 22px;font-size:.875rem;font-weight:600;cursor:pointer}
    .btn-submit:hover{background:var(--blue-dark)}
    .btn-submit:disabled{opacity:.5;cursor:not-allowed}
    .btn-cancel{background:var(--card);color:var(--muted);border:1.5px solid var(--border);border-radius:8px;padding:10px 16px;font-size:.875rem;cursor:pointer}

    /* Success state */
    #success-state{display:none;text-align:center;padding:32px 22px}
    #success-state .tick{font-size:3rem;margin-bottom:12px}
    #success-state h3{font-size:1.1rem;font-weight:700;margin-bottom:6px}
    #success-state p{font-size:.84rem;color:var(--muted);line-height:1.6}

    /* footer */
    footer{text-align:center;padding:24px;font-size:.72rem;color:var(--muted);margin-top:20px}
    footer a{color:var(--blue);text-decoration:none}
    footer a:hover{text-decoration:underline}
  </style>
</head>
<body>

<header>
  <div style="font-size:2rem;margin-bottom:4px">👔</div>
  <h1>Jeremy's Tie Collection</h1>
  <p>Browse and request to borrow a tie</p>
  <div class="header-stats">
    <span class="stat-pill" id="stat-total">Loading…</span>
    <span class="stat-pill" id="stat-available"></span>
  </div>
</header>

<div id="controls">
  <div id="search-wrap">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="search" placeholder="Search by color, pattern, occasion…"/>
  </div>
  <div class="filter-row" id="filter-color"><span class="filter-label">Color</span></div>
  <div class="filter-row" id="filter-occasion"><span class="filter-label">Occasion</span></div>
  <div class="filter-row" id="filter-avail">
    <span class="filter-label">Status</span>
    <button class="filter-pill" data-avail="in">Available only</button>
  </div>
</div>

<div id="stats-bar"><span id="stats-text"></span></div>
<div id="loading">Loading collection…</div>
<div id="grid"></div>
<div id="empty"><p style="font-size:.9rem;font-weight:600">No ties match your search</p></div>

<!-- Request Modal -->
<div class="modal-overlay" id="req-modal">
  <div class="modal-box">
    <div class="modal-head" id="modal-head-main">
      <h2>Request to borrow</h2>
      <button class="modal-close" id="modal-close-btn"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body" id="modal-body-form">
      <div class="tie-preview">
        <img class="tie-preview-img" id="preview-img" src="" alt="" onerror="this.style.display='none'"/>
        <div class="tie-preview-info">
          <h3 id="preview-name"></h3>
          <p id="preview-details"></p>
        </div>
      </div>
      <div class="field"><label>Your name <span>*</span></label><input type="text" id="r-name" placeholder="Full name" autocomplete="name"/></div>
      <div class="field"><label>Your phone number <span>*</span></label><input type="tel" id="r-phone" placeholder="e.g. 012-345-6789" autocomplete="tel"/></div>
      <div class="field"><label>Note to Jeremy (optional)</label><textarea id="r-note" rows="2" placeholder="When do you need it? Any event?"></textarea></div>
    </div>
    <div class="modal-foot" id="modal-foot-form">
      <button class="btn-cancel" id="modal-cancel-btn">Cancel</button>
      <button class="btn-submit" id="btn-submit-req">Send Request</button>
    </div>
    <!-- Success -->
    <div id="success-state">
      <div class="tick">✅</div>
      <h3>Request sent!</h3>
      <p>Jeremy will be in touch soon to arrange the pickup.<br/>His number: <strong>+60122941116</strong></p>
      <button class="btn-submit" style="margin-top:20px;width:100%" onclick="closeModal()">Done</button>
    </div>
  </div>
</div>

<footer>Built by <a href="https://tektwv.my" target="_blank">tektwv.my</a></footer>

<script>
'use strict';
const API = '/api';
const COLOR_HEX = {Red:'#DC2626',Orange:'#EA580C',Yellow:'#CA8A04',Green:'#16A34A',Blue:'#2563EB',Purple:'#7C3AED',Pink:'#DB2777',Brown:'#92400E',Gray:'#6B7280',Black:'#374151',White:'#E2E8F0',Navy:'#1E3A5F',Teal:'#0D9488',Gold:'#B45309',Silver:'#9CA3AF',Beige:'#D4B896',Maroon:'#7F1D1D',Multicolor:'conic-gradient(from 0deg,#DC2626,#2563EB,#16A34A,#CA8A04,#DC2626)'};
const COLORS   = ['Red','Orange','Yellow','Green','Blue','Purple','Pink','Brown','Gray','Black','White','Navy','Teal','Gold','Silver','Beige','Maroon','Multicolor'];
const OCCASIONS = ['Formal','Business','Casual','Wedding','Other'];

let ties = [], filters = {color:'',occasion:'',avail:''}, searchQuery = '', selectedTie = null;

function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function dotStyle(c){const v=COLOR_HEX[c];return v?`background:${v}`:'background:#94A3B8'}

async function loadTies(){
  document.getElementById('loading').style.display='block';
  try{
    const res=await fetch(`${API}/ties.php`);
    ties=await res.json();
    // Also load pending requests to know which ties have pending requests
    updateStats();renderFilters();renderGallery();
  }catch(e){document.getElementById('loading').textContent='Failed to load. Please refresh.';}
  document.getElementById('loading').style.display='none';
}

function updateStats(){
  const avail=ties.filter(t=>t.loan_status==='in').length;
  document.getElementById('stat-total').textContent=`${ties.length} ties`;
  document.getElementById('stat-available').textContent=`${avail} available`;
}

function getFiltered(){
  const q=searchQuery.toLowerCase();
  return ties.filter(t=>{
    if(filters.color && t.color!==filters.color) return false;
    if(filters.occasion && t.occasion!==filters.occasion) return false;
    if(filters.avail==='in' && t.loan_status!=='in') return false;
    if(q && ![t.color,t.color2,t.pattern,t.size,t.occasion].join(' ').toLowerCase().includes(q)) return false;
    return true;
  });
}

function renderFilters(){
  function buildRow(rowId,key,allOpts){
    const present=new Set(ties.map(t=>t[key]).filter(Boolean));
    const row=document.getElementById(rowId);
    const label=row.querySelector('.filter-label');
    row.innerHTML='';row.appendChild(label);
    allOpts.filter(v=>present.has(v)).forEach(v=>{
      const btn=document.createElement('button');
      btn.className='filter-pill'+(filters[key]===v?' active':'');
      btn.dataset.key=key;btn.dataset.val=v;
      if(key==='color')btn.innerHTML=`<span class="color-dot" style="${dotStyle(v)}"></span>${esc(v)}`;
      else btn.textContent=v;
      row.appendChild(btn);
    });
  }
  buildRow('filter-color','color',COLORS);
  buildRow('filter-occasion','occasion',OCCASIONS);
  document.querySelectorAll('#filter-avail .filter-pill').forEach(p=>p.classList.toggle('active',filters.avail==='in'));
}

function renderGallery(){
  const list=getFiltered();
  const grid=document.getElementById('grid'),empty=document.getElementById('empty');
  document.getElementById('stats-text').textContent=list.length===ties.length?`${ties.length} ties in the collection`:`Showing ${list.length} of ${ties.length} ties`;
  if(!list.length){grid.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  grid.innerHTML=list.map(t=>{
    const available=t.loan_status==='in';
    const name=[t.color,t.color2&&t.color2!==t.color?'/ '+t.color2:'',t.pattern].filter(Boolean).join(' ');
    return `<article class="card${!available?' unavailable':''}" onclick="${available?`openRequest(${t.id})`:''}">
      <div>
        ${t.photo?`<img class="card-photo" src="${esc(t.photo)}" alt="${esc(name)}" loading="lazy"/>`
          :`<div class="card-photo-placeholder"><svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" style="color:var(--blue-light)"><path stroke-linecap="round" stroke-linejoin="round" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><circle cx="12" cy="13" r="3"/></svg></div>`}
      </div>
      <div class="card-body">
        <div class="card-title"><span class="color-dot" style="${dotStyle(t.color)}"></span><span style="overflow:hidden;text-overflow:ellipsis">${esc(name)}</span></div>
        <div class="card-tags">
          ${t.size?`<span class="tag size">${esc(t.size)}</span>`:''}
          ${t.occasion?`<span class="tag occasion">${esc(t.occasion)}</span>`:''}
          ${available?`<span class="tag available">Available</span>`:`<span class="tag unavailable">On Loan</span>`}
        </div>
      </div>
      ${available?`<div class="card-foot"><button class="btn-request" onclick="event.stopPropagation();openRequest(${t.id})">Request to Borrow</button></div>`:''}
    </article>`;
  }).join('');
}

// Filter events
['filter-color','filter-occasion'].forEach(id=>{
  document.getElementById(id).addEventListener('click',e=>{
    const p=e.target.closest('.filter-pill');if(!p)return;
    const{key,val}=p.dataset;filters[key]=filters[key]===val?'':val;renderFilters();renderGallery();
  });
});
document.getElementById('filter-avail').addEventListener('click',e=>{
  const p=e.target.closest('.filter-pill');if(!p)return;
  filters.avail=filters.avail==='in'?'':'in';renderFilters();renderGallery();
});
document.getElementById('search').addEventListener('input',e=>{searchQuery=e.target.value;renderGallery();});

// Request modal
function openRequest(tieId){
  selectedTie=ties.find(t=>t.id==tieId);if(!selectedTie)return;
  const name=[selectedTie.color,selectedTie.color2&&selectedTie.color2!==selectedTie.color?'/ '+selectedTie.color2:'',selectedTie.pattern].filter(Boolean).join(' ');
  document.getElementById('preview-name').textContent=name;
  document.getElementById('preview-details').textContent=[selectedTie.size,selectedTie.occasion,selectedTie.condition_].filter(Boolean).join(' · ');
  const img=document.getElementById('preview-img');
  if(selectedTie.photo){img.src=selectedTie.photo;img.style.display='block';}else{img.style.display='none';}
  document.getElementById('r-name').value='';
  document.getElementById('r-phone').value='';
  document.getElementById('r-note').value='';
  document.getElementById('modal-body-form').style.display='';
  document.getElementById('modal-foot-form').style.display='';
  document.getElementById('modal-head-main').style.display='';
  document.getElementById('success-state').style.display='none';
  document.getElementById('req-modal').classList.add('open');
}

function closeModal(){document.getElementById('req-modal').classList.remove('open');selectedTie=null;}
document.getElementById('modal-close-btn').addEventListener('click',closeModal);
document.getElementById('modal-cancel-btn').addEventListener('click',closeModal);
document.getElementById('req-modal').addEventListener('click',e=>{if(e.target===document.getElementById('req-modal'))closeModal();});

document.getElementById('btn-submit-req').addEventListener('click',async()=>{
  const name=document.getElementById('r-name').value.trim();
  const phone=document.getElementById('r-phone').value.trim();
  const note=document.getElementById('r-note').value.trim();
  if(!name){document.getElementById('r-name').focus();return;}
  if(!phone){document.getElementById('r-phone').focus();return;}
  const btn=document.getElementById('btn-submit-req');
  btn.disabled=true;btn.textContent='Sending…';
  try{
    const res=await fetch(`${API}/requests.php`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({tie_id:selectedTie.id,requester_name:name,requester_phone:phone,note})});
    const data=await res.json();
    if(res.ok&&data.ok){
      document.getElementById('modal-body-form').style.display='none';
      document.getElementById('modal-foot-form').style.display='none';
      document.getElementById('modal-head-main').style.display='none';
      document.getElementById('success-state').style.display='block';
    } else {
      alert(data.error||'Something went wrong. Please try again.');
    }
  }catch(e){alert('Network error. Please try again.');}
  btn.disabled=false;btn.textContent='Send Request';
});

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

loadTies();
</script>
</body>
</html>
